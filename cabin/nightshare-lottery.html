<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<link href="https://solun.art/nightshare-lottery" rel="canonical"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NIGHTSHARE 抽選希望提出 — SOLUNA</title>
<meta content="noindex,nofollow" name="robots"/>
<link href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'&gt;&lt;circle cx='16' cy='16' r='14' fill='%23c8a455'/&gt;&lt;/svg&gt;" rel="icon"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8a455;--bg:#040404;--text:#f0ece4;--line:#1a1a1a}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',-apple-system,'Noto Sans JP',sans-serif;padding:60px 20px;min-height:100vh}
a{color:var(--gold)}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:22px;font-weight:800;margin-bottom:8px}
.sub{color:#888;font-size:12.5px;line-height:1.9;margin-bottom:30px}
.box{background:#0a0a0a;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:20px}
label{display:block;font-size:11px;color:#888;letter-spacing:.06em;font-weight:700;margin-bottom:6px;text-transform:uppercase}
input,select{width:100%;padding:11px 13px;background:#0d0d0d;border:1px solid var(--line);color:var(--text);font-size:13.5px;border-radius:8px;outline:none;font-family:inherit;margin-bottom:14px}
input:focus,select:focus{border-color:var(--gold)}
input[type=date]{color:#bbb}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.candidate{padding:18px;background:#080808;border:1px solid #131313;border-radius:10px;margin-bottom:14px}
.candidate-h{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.08em;margin-bottom:10px}
.btn{background:var(--gold);color:#040404;font-size:13px;font-weight:800;padding:14px;border-radius:100px;border:none;cursor:pointer;width:100%;letter-spacing:.04em;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,164,85,.25)}
.btn:disabled{background:#222;color:#555;cursor:not-allowed;transform:none;box-shadow:none}
.msg{font-size:11.5px;text-align:center;margin-top:12px;min-height:18px;line-height:1.7}
.purchases{padding:14px 18px;background:rgba(200,164,85,.05);border:1px solid rgba(200,164,85,.2);border-radius:10px;font-size:12px;color:#aaa;line-height:1.9;margin-bottom:18px}
.history{margin-top:30px}
.history h3{font-size:12px;color:#888;letter-spacing:.06em;font-weight:700;margin-bottom:12px;text-transform:uppercase}
.entry{padding:12px 14px;background:#080808;border-left:3px solid #222;border-radius:4px;margin-bottom:8px;font-size:11.5px;color:#aaa;line-height:1.8}
.entry.won{border-left-color:var(--gold)}
.entry.lost{border-left-color:#c87a55}
.gnav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:13px 24px;background:rgba(4,4,4,.93);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04);z-index:9999;font-size:10.5px}
.gnav a{color:#888;text-decoration:none}
.gnav a.gold{color:var(--gold);font-weight:800;letter-spacing:.22em}
</style>
</head>
<body>
<nav class="gnav">
<a class="gold" href="index">SOLUNA</a>
<a href="nightshare">← NIGHTSHARE</a>
</nav>

<div class="wrap" style="margin-top:30px">
<h1>NIGHTSHARE 抽選希望提出</h1>
<p class="sub">毎月15日23:59までに翌々月の希望3連泊期間を提出 → 20日抽選 → 25日通知。<br/>第1〜3希望まで提出可能。</p>

<div class="box">
<label for="email">登録メールアドレス</label>
<input id="email" type="email" placeholder="購入時のメールアドレス" autocomplete="email"/>
<button class="btn" onclick="loadPurchases()">購入情報を取得</button>
<p class="msg" id="email-msg"></p>
</div>

<div id="purchase-section" style="display:none">
<div class="box">
<label for="purchase">対象の購入</label>
<select id="purchase"></select>
<div class="purchases" id="purchase-info"></div>

<label for="target">抽選対象月</label>
<input id="target" type="month" required/>

<div class="candidate">
<div class="candidate-h">第1希望（必須）</div>
<div class="row">
<div><label>チェックイン</label><input id="c1-start" type="date"/></div>
<div><label>チェックアウト（自動）</label><input id="c1-end" type="date" readonly style="background:#070707;color:#888"/></div>
</div>
</div>

<div class="candidate">
<div class="candidate-h">第2希望（任意）</div>
<div class="row">
<div><label>チェックイン</label><input id="c2-start" type="date"/></div>
<div><label>チェックアウト（自動）</label><input id="c2-end" type="date" readonly style="background:#070707;color:#888"/></div>
</div>
</div>

<div class="candidate">
<div class="candidate-h">第3希望（任意）</div>
<div class="row">
<div><label>チェックイン</label><input id="c3-start" type="date"/></div>
<div><label>チェックアウト（自動）</label><input id="c3-end" type="date" readonly style="background:#070707;color:#888"/></div>
</div>
</div>

<button class="btn" onclick="submitLottery()" id="submit-btn">抽選希望を提出</button>
<p class="msg" id="submit-msg"></p>
</div>

<div class="history" id="history-section" style="display:none">
<h3>過去の抽選履歴</h3>
<div id="history-list"></div>
</div>
</div>

</div>

<script>
let _purchases = [];

// 3連泊（チェックイン→3日後がチェックアウト）の自動計算
['c1','c2','c3'].forEach(prefix => {
  document.getElementById(prefix+'-start').addEventListener('change', e => {
    const d = new Date(e.target.value);
    if(isNaN(d)) { document.getElementById(prefix+'-end').value=''; return; }
    d.setDate(d.getDate()+3);
    document.getElementById(prefix+'-end').value = d.toISOString().slice(0,10);
  });
});

async function loadPurchases() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('email-msg');
  if(!email || !email.includes('@')){ msg.style.color='#c87a55'; msg.textContent='メールアドレスを入力してください'; return; }
  msg.style.color='#888'; msg.textContent='読み込み中…';
  try {
    const r = await fetch('/api/cabin/nightshare/purchase?email='+encodeURIComponent(email));
    const data = await r.json();
    _purchases = (data.purchases||[]).filter(p => p.status === 'paid');
    if(!_purchases.length){
      msg.style.color='#c87a55';
      msg.textContent = '決済完了済みの購入が見つかりません。';
      document.getElementById('purchase-section').style.display='none';
      return;
    }
    msg.style.color='var(--gold)';
    msg.textContent = `✓ ${_purchases.length}件の購入を取得`;
    const sel = document.getElementById('purchase');
    sel.innerHTML = _purchases.map(p =>
      `<option value="${p.id}">${p.property} — ${p.sets}セット (残${(p.nights_total||90)-(p.nights_used||0)}/${p.nights_total||90}泊)</option>`
    ).join('');
    sel.onchange = updatePurchaseInfo;
    document.getElementById('purchase-section').style.display='block';
    updatePurchaseInfo();
    loadHistory();
  } catch(e){
    msg.style.color='#c87a55';
    msg.textContent = '通信エラー';
  }
}

function updatePurchaseInfo(){
  const id = document.getElementById('purchase').value;
  const p = _purchases.find(x => x.id === id);
  if(!p) return;
  document.getElementById('purchase-info').innerHTML =
    `購入ID: <strong style="color:#ccc">${p.id}</strong><br/>物件: ${p.property}<br/>契約期間: ${p.valid_from||'—'} 〜 ${p.valid_until||'—'}`;
}

async function loadHistory(){
  const id = document.getElementById('purchase').value;
  if(!id) return;
  try {
    const r = await fetch('/api/cabin/nightshare/lottery/list?purchase_id='+encodeURIComponent(id));
    const data = await r.json();
    const list = document.getElementById('history-list');
    if(!data.entries || !data.entries.length){
      document.getElementById('history-section').style.display='none';
      return;
    }
    document.getElementById('history-section').style.display='block';
    list.innerHTML = data.entries.map(e => {
      const cls = e.status==='won'?'won':(e.status==='lost'||e.status==='guaranteed_next'?'lost':'');
      const status = e.status==='won' ? `✓ 当選 ${e.awarded_start}〜${e.awarded_end}`
                  : e.status==='lost' ? `✕ 落選（連続${e.losses}回・翌月再抽選）`
                  : e.status==='guaranteed_next' ? `⚡ 次回確定（連続${e.losses}回落選）`
                  : '◯ 受付済（抽選待ち）';
      return `<div class="entry ${cls}">${e.target_year}年${e.target_month}月 — ${status}</div>`;
    }).join('');
  } catch(e){}
}

async function submitLottery() {
  const purchase_id = document.getElementById('purchase').value;
  const email = document.getElementById('email').value.trim();
  const target = document.getElementById('target').value; // YYYY-MM
  if(!target){ alert('抽選対象月を選択してください'); return; }
  const [y,m] = target.split('-');
  const candidates = [];
  for(const i of [1,2,3]){
    const s = document.getElementById('c'+i+'-start').value;
    const e = document.getElementById('c'+i+'-end').value;
    if(s && e) candidates.push({ start: s, end: e });
  }
  if(!candidates.length){ alert('第1希望は必須です'); return; }
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('submit-msg');
  btn.disabled = true; btn.textContent = '送信中…';
  try {
    const r = await fetch('/api/cabin/nightshare/lottery/submit',{
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ purchase_id, email, target_year: Number(y), target_month: Number(m), candidates })
    });
    const data = await r.json();
    if(!r.ok){ msg.style.color='#c87a55'; msg.textContent = '✕ '+(data.error||'失敗'); btn.disabled=false; btn.textContent='抽選希望を提出'; return; }
    msg.style.color='var(--gold)';
    msg.textContent = '✓ 抽選希望を受付ました（ID: '+data.id+'）。20日に抽選、25日までに通知メール送付。';
    btn.textContent = '受付完了';
    loadHistory();
  } catch(e){
    msg.style.color='#c87a55'; msg.textContent='通信エラー';
    btn.disabled=false; btn.textContent='抽選希望を提出';
  }
}
</script>
</body>
</html>
